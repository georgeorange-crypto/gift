function createRoundedBoxPro(width, height, depth, radius, smoothness) {
    const shape = new THREE.Shape();
    const hw = width / 2 - radius;
    const hh = height / 2 - radius;
    
    shape.moveTo(-hw, -hh + radius);
    shape.lineTo(-hw, hh - radius);
    shape.quadraticCurveTo(-hw, hh, -hw + radius, hh);
    shape.lineTo(hw - radius, hh);
    shape.quadraticCurveTo(hw, hh, hw, hh - radius);
    shape.lineTo(hw, -hh + radius);
    shape.quadraticCurveTo(hw, -hh, hw - radius, -hh);
    shape.lineTo(-hw + radius, -hh);
    shape.quadraticCurveTo(-hw, -hh, -hw, -hh + radius);
    
    const extrudeSettings = {
        steps: 4,
        depth: depth - radius * 2,
        bevelEnabled: true,
        bevelThickness: radius,
        bevelSize: radius,
        bevelOffset: 0,
        bevelSegments: smoothness
    };
    
    const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
    geometry.center();
    return geometry;
}

function createRibbonCurve(points, thickness) {
    const curve = new THREE.CatmullRomCurve3(points);
    const geometry = new THREE.TubeGeometry(curve, 64, thickness, 12, false);
    return geometry;
}

function createCake() {
    const cakeGroup = new THREE.Group();
    cakeGroup.position.y = 0;
    cakeGroup.scale.set(0.3, 0.3, 0.3);
    cakeGroup.visible = true;
    
    const plateGeom = new THREE.CylinderGeometry(1.6, 1.6, 0.1, 64);
    const plateMat = new THREE.MeshPhysicalMaterial({
        color: 0xFFFFFF,
        roughness: 0.08,
        clearcoat: 1,
        clearcoatRoughness: 0.04
    });
    const plate = new THREE.Mesh(plateGeom, plateMat);
    plate.position.y = -0.3;
    plate.castShadow = true;
    plate.receiveShadow = true;
    cakeGroup.add(plate);
    
    const cakeColors = [0xFFE4E1, 0xFFB6C1, 0xFFC0CB];
    const creamColors = [0xFFFFFF, 0xFFFACD, 0xFFE4B5];
    
    for (let layer = 0; layer < 3; layer++) {
        const layerGroup = new THREE.Group();
        const radius = 1.3 - layer * 0.25;
        const height = 0.55 - layer * 0.05;
        const yOffset = layer * 0.45;
        
        const cakeMat = new THREE.MeshPhysicalMaterial({
            color: cakeColors[layer],
            roughness: 0.32,
            clearcoat: 0.3,
            clearcoatRoughness: 0.28
        });
        const cakeGeom = new THREE.CylinderGeometry(radius, radius, height, 64);
        const cakeMesh = new THREE.Mesh(cakeGeom, cakeMat);
        cakeMesh.position.y = yOffset;
        cakeMesh.castShadow = true;
        cakeMesh.receiveShadow = true;
        layerGroup.add(cakeMesh);
        
        const creamMat = new THREE.MeshPhysicalMaterial({
            color: creamColors[layer],
            roughness: 0.12,
            clearcoat: 0.75,
            clearcoatRoughness: 0.08
        });
        const creamGeom = new THREE.TorusGeometry(radius * 0.9, 0.08, 16, 64);
        const cream = new THREE.Mesh(creamGeom, creamMat);
        cream.rotation.x = Math.PI / 2;
        cream.position.y = yOffset + height / 2 + 0.03;
        layerGroup.add(cream);
        
        for (let i = 0; i < 16; i++) {
            const angle = (i / 16) * Math.PI * 2;
            const dropGeom = new THREE.SphereGeometry(0.06, 16, 16);
            const drop = new THREE.Mesh(dropGeom, creamMat);
            drop.scale.y = 1.3;
            drop.position.set(
                Math.cos(angle) * radius * 0.88,
                yOffset + height / 2 + 0.09,
                Math.sin(angle) * radius * 0.88
            );
            layerGroup.add(drop);
        }
        
        cakeGroup.add(layerGroup);
    }
    
    const candleColors = [0xFF6B6B, 0xFFE66D, 0x4ECDC4, 0xF38181, 0x95E1D3];
    const candles = [];
    for (let i = 0; i < 5; i++) {
        const candleGroup = new THREE.Group();
        const angle = (i / 5) * Math.PI * 2;
        const candleRadius = 0.35;
        
        const candleGeom = new THREE.CylinderGeometry(0.04, 0.04, 0.5, 16);
        const candleMat = new THREE.MeshStandardMaterial({ color: candleColors[i] });
        const candle = new THREE.Mesh(candleGeom, candleMat);
        candle.position.y = 0.25;
        candleGroup.add(candle);
        
        const flameGeom = new THREE.SphereGeometry(0.06, 16, 16);
        const flameMat = new THREE.MeshBasicMaterial({ 
            color: 0xFFA500, 
            transparent: true, 
            opacity: 0.9 
        });
        const flame = new THREE.Mesh(flameGeom, flameMat);
        flame.position.y = 0.65;
        flame.scale.y = 1.5;
        flame.userData.flickerOffset = Math.random() * Math.PI * 2;
        candleGroup.add(flame);
        candleGroup.userData.flame = flame;
        
        candleGroup.position.set(
            Math.cos(angle) * candleRadius,
            1.1,
            Math.sin(angle) * candleRadius
        );
        cakeGroup.add(candleGroup);
        candles.push(candleGroup);
    }
    cakeGroup.userData.candles = candles;
    
    const strawberryPositions = [
        [0.6, 0.95, 0], [-0.6, 0.95, 0], [0, 0.95, 0.6], [0, 0.95, -0.6]
    ];
    strawberryPositions.forEach((pos) => {
        const strawberry = new THREE.Group();
        const berryGeom = new THREE.SphereGeometry(0.13, 16, 16);
        const berryMat = new THREE.MeshStandardMaterial({ 
            color: 0xFF4757,
            roughness: 0.28
        });
        const berry = new THREE.Mesh(berryGeom, berryMat);
        berry.scale.y = 1.35;
        strawberry.add(berry);
        
        strawberry.position.set(pos[0], pos[1], pos[2]);
        cakeGroup.add(strawberry);
    });
    
    return cakeGroup;
}

function updateCamera() {
    const isMobile = innerWidth < 768;
    const isTablet = innerWidth >= 768 && innerWidth < 1024;
    
    if (isMobile) {
        camera.position.set(3.2, 2.0, 5.5);
    } else if (isTablet) {
        camera.position.set(4.0, 2.2, 6.0);
    } else {
        camera.position.set(5.0, 2.5, 7.0);
    }
}

let phase = 0;
let animationTime = 0;
let phaseStartTime = 0;

function handleClick() {
    if (phase === 0) {
        phase = 1;
        phaseStartTime = animationTime;
        document.getElementById('click-hint').style.opacity = '0';
    } else if (phase === 2) {
        phase = 3;
        phaseStartTime = animationTime;
        document.getElementById('cut-hint').style.opacity = '0';
    }
}

window.addEventListener('click', handleClick);

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('click', (event) => {
    if (phase === 2) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(cake, true);
        
        if (intersects.length > 0) {
            phase = 3;
            phaseStartTime = animationTime;
            document.getElementById('cut-hint').style.opacity = '0';
        }
    }
});

function animate() {
    requestAnimationFrame(animate);
    animationTime += 0.016;
    
    updateCamera();
    
    const rotationSpeed = 0.08;
    currentRotationX += (targetRotationX - currentRotationX) * rotationSpeed;
    currentRotationY += (targetRotationY - currentRotationY) * rotationSpeed;
    
    if (gift.userData.sparkles) {
        gift.userData.sparkles.forEach(spark => {
            const data = spark.userData;
            const t = animationTime * data.speed + data.offset;
            spark.position.y = data.y + Math.sin(t) * 0.18;
            spark.rotation.x += 0.035;
            spark.rotation.y += 0.055;
            spark.material.opacity = 0.45 + Math.sin(t) * 0.55;
        });
    }
    
    if (gift.userData.tail1 && gift.userData.tail2) {
        const wave1 = Math.sin(animationTime * 2.0) * 0.08;
        const wave2 = Math.sin(animationTime * 2.5 + 1.0) * 0.06;
        gift.userData.tail1.rotation.z = wave1;
        gift.userData.tail1.rotation.x = wave2;
        gift.userData.tail2.rotation.z = -wave1 * 0.9;
        gift.userData.tail2.rotation.x = -wave2 * 0.85;
    }
    
    if (cake.userData.candles) {
        cake.userData.candles.forEach(candleGroup => {
            if (candleGroup.userData.flame) {
                const flame = candleGroup.userData.flame;
                const flicker = 0.9 + Math.sin(animationTime * 15 + flame.userData.flickerOffset) * 0.15;
                flame.scale.set(flicker, flicker * 1.5, flicker);
                flame.material.opacity = 0.7 + Math.sin(animationTime * 20 + flame.userData.flickerOffset) * 0.3;
            }
        });
    }
    
    if (phase === 0) {
        const bounce = Math.sin(animationTime * 2.5) * 0.08;
        gift.position.y = bounce;
        gift.rotation.y = currentRotationY + Math.sin(animationTime * 0.5) * 0.1;
        gift.rotation.x = currentRotationX * 0.5;
    } else if (phase === 1) {
        const elapsed = animationTime - phaseStartTime;
        
        if (elapsed < 2.0) {
            gift.rotation.y = currentRotationY;
            gift.rotation.x = currentRotationX * 0.3;
            gift.position.y = 0;
            
            if (gift.userData.lid && elapsed > 0.2) {
                const lidT = Math.min((elapsed - 0.2) / 1.5, 1);
                gift.userData.lid.position.y = 0.85 + lidT * 2.0;
                gift.userData.lid.rotation.x = lidT * Math.PI / 3;
                gift.userData.lid.position.x = Math.sin(lidT * Math.PI) * 0.6;
            }
            
            if (gift.userData.bow && elapsed > 0.2) {
                const bowT = Math.min((elapsed - 0.2) / 1.5, 1);
                gift.userData.bow.position.y = 1.25 + bowT * 2.0;
                gift.userData.bow.rotation.x = bowT * Math.PI / 3;
                gift.userData.bow.position.x = Math.sin(bowT * Math.PI) * 0.6;
            }
            
            const boxT = Math.min(elapsed / 1.2, 1);
            const scaleT = Math.min(boxT * 2, 1);
            const scale = 1 + scaleT * 0.4;
            
            gift.traverse(obj => {
                if (obj !== gift.userData.lid && obj !== gift.userData.bow) {
                    if (obj.material) {
                        obj.material.transparent = true;
                        obj.material.opacity = Math.max(0, 1 - boxT * 1.2);
                    }
                    if (obj.geometry) {
                        obj.scale.set(scale, scale, scale);
                        obj.position.x += Math.sin(boxT * Math.PI) * 0.005 * (Math.random() - 0.5);
                        obj.position.y += Math.sin(boxT * Math.PI) * 0.005 * (Math.random() - 0.5);
                        obj.position.z += Math.sin(boxT * Math.PI) * 0.005 * (Math.random() - 0.5);
                    }
                }
            });
        }
        
        if (elapsed > 0) {
            const cakeT = Math.min(elapsed / 1.2, 1);
            const smoothT = cakeT * cakeT * (3 - 2 * cakeT);
            cake.scale.lerp(new THREE.Vector3(0.3 + smoothT * 0.7, 0.3 + smoothT * 0.7, 0.3 + smoothT * 0.7), 0.2);
            cake.rotation.y = currentRotationY + 0.3;
        }
        
        if (elapsed > 1.0) {
            gift.visible = false;
        }
        
        if (elapsed > 0.5) {
            const targetCamPos = innerWidth < 768
                ? new THREE.Vector3(2.8, 1.7, 4.5)
                : (innerWidth < 1024 ? new THREE.Vector3(3.3, 1.9, 5.0) : new THREE.Vector3(4.0, 2.2, 5.5));
            camera.position.lerp(targetCamPos, 0.02);
        }
        
        // 移除自动显示贺卡的代码，改为在点击切蛋糕后显示
        
        if (elapsed > 1.8) {
            phase = 2;
            document.getElementById('cut-hint').style.opacity = '1';
        }
    } else if (phase === 2) {
        cake.rotation.y = currentRotationY + 0.5;
    } else if (phase === 3) {
        const elapsed = animationTime - phaseStartTime;
        
        cake.rotation.y = currentRotationY + 0.5 + elapsed * 0.1;
        
        if (elapsed > 0.5) {
            // 显示贪吃蛇游戏弹窗
            const snakeGameModal = document.getElementById('snake-game-modal');
            snakeGameModal.style.display = 'flex';
            initSnakeGame();
        }
        
        if (elapsed > 0.8) {
            phase = 4;
        }
    } else if (phase === 4) {
        cake.rotation.y = currentRotationY + 0.5;
    }
    
    camera.lookAt(target);
    renderer.render(scene, camera);
}

// 贪吃蛇游戏逻辑
const CANVAS_WIDTH = 400;
const CANVAS_HEIGHT = 400;
const GRID_SIZE = 20;
const GRID_WIDTH = CANVAS_WIDTH / GRID_SIZE;
const GRID_HEIGHT = CANVAS_HEIGHT / GRID_SIZE;

let snake = [];
let food = {};
let direction = 'right';
let nextDirection = 'right';
let score = 0;
let gameInterval;
let gameSpeed = 150;
let hole = null;
let gameWon = false;

const canvas = document.getElementById('snake-canvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('snake-score');
const gameOverElement = document.getElementById('snake-game-over');
const finalScoreElement = document.getElementById('snake-final-score');
const restartBtn = document.getElementById('snake-restart-btn');
const snakeGameModal = document.getElementById('snake-game-modal');
const closeSnakeModalBtn = document.getElementById('close-snake-modal');

function initSnakeGame() {
    snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
    ];
    direction = 'right';
    nextDirection = 'right';
    score = 0;
    hole = null;
    gameWon = false;
    scoreElement.textContent = score;
    gameOverElement.style.display = 'none';
    generateFood();
    if (gameInterval) {
        clearInterval(gameInterval);
    }
    gameInterval = setInterval(gameLoop, gameSpeed);
}

function generateFood() {
    food = {
        x: Math.floor(Math.random() * GRID_WIDTH),
        y: Math.floor(Math.random() * GRID_HEIGHT)
    };
    for (let segment of snake) {
        if (segment.x === food.x && segment.y === food.y) {
            generateFood();
            return;
        }
    }
}

function gameLoop() {
    direction = nextDirection;
    const head = { ...snake[0] };
    switch (direction) {
        case 'up':
            head.y -= 1;
            break;
        case 'down':
            head.y += 1;
            break;
        case 'left':
            head.x -= 1;
            break;
        case 'right':
            head.x += 1;
            break;
    }
    if (head.x < 0) {
        head.x = GRID_WIDTH - 1;
    } else if (head.x >= GRID_WIDTH) {
        head.x = 0;
    }
    if (head.y < 0) {
        head.y = GRID_HEIGHT - 1;
    } else if (head.y >= GRID_HEIGHT) {
        head.y = 0;
    }
    let collision = false;
    for (let i = 1; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
            collision = true;
            break;
        }
    }
    if (collision) {
        gameOver();
        return;
    }
    if (score >= 20 && !hole) {
        hole = {
            x: Math.floor(GRID_WIDTH / 2),
            y: Math.floor(GRID_HEIGHT / 2)
        };
    }
    const headInHole = hole && head.x === hole.x && head.y === hole.y;
    if (headInHole) {
        snake.shift();
        if (snake.length === 0) {
            gameWon = true;
            gameOver();
            return;
        }
    } else {
        snake.unshift(head);
        if (score < 20) {
            if (head.x === food.x && head.y === food.y) {
                score += 1;
                scoreElement.textContent = score;
                generateFood();
                if (gameSpeed > 50) {
                    gameSpeed -= 5;
                    clearInterval(gameInterval);
                    gameInterval = setInterval(gameLoop, gameSpeed);
                }
            } else {
                snake.pop();
            }
        } else {
            snake.pop();
        }
    }
    drawGame();
}

function drawGame() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    if (hole) {
        ctx.fillStyle = '#000000';
        ctx.fillRect(hole.x * GRID_SIZE, hole.y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 2;
        ctx.strokeRect(hole.x * GRID_SIZE, hole.y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
    }
    ctx.fillStyle = '#4CAF50';
    for (let segment of snake) {
        ctx.fillRect(segment.x * GRID_SIZE, segment.y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
        ctx.strokeStyle = '#333';
        ctx.strokeRect(segment.x * GRID_SIZE, segment.y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
    }
    if (score < 20) {
        ctx.fillStyle = '#FF5722';
        ctx.fillRect(food.x * GRID_SIZE, food.y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
        ctx.strokeStyle = '#333';
        ctx.strokeRect(food.x * GRID_SIZE, food.y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
    }
}

function gameOver() {
    clearInterval(gameInterval);
    finalScoreElement.textContent = score;
    const gameOverTitle = document.getElementById('snake-game-over-title');
    if (gameWon) {
        gameOverTitle.textContent = '有惊喜！';
        // 游戏胜利后，关闭游戏弹窗，显示贺卡
        setTimeout(() => {
            snakeGameModal.style.display = 'none';
            const bdayText = document.getElementById('birthday-text');
            bdayText.style.opacity = '1';
            bdayText.style.transform = 'translateX(-50%) translateY(-50%)';
        }, 2000);
    } else {
        gameOverTitle.textContent = '游戏结束';
    }
    gameOverElement.style.display = 'block';
}

document.addEventListener('keydown', function(e) {
    if (snakeGameModal.style.display === 'flex') {
        switch (e.key) {
            case 'ArrowUp':
                if (direction !== 'down') {
                    nextDirection = 'up';
                }
                break;
            case 'ArrowDown':
                if (direction !== 'up') {
                    nextDirection = 'down';
                }
                break;
            case 'ArrowLeft':
                if (direction !== 'right') {
                    nextDirection = 'left';
                }
                break;
            case 'ArrowRight':
                if (direction !== 'left') {
                    nextDirection = 'right';
                }
                break;
        }
    }
});

    }
});

    if (direction !== 'left') {
        nextDirection = 'right';
    }
});

// 移动端适配 - Three.js和触摸事件
(function() {
    // 检测移动端
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    if (isMobile || window.innerWidth < 768) {
        // 调整相机视角
        camera.fov = 60;
        camera.position.z = 4.5;
        camera.updateProjectionMatrix();
        
        // 降低阴影质量以提高性能
        keyLight.shadow.mapSize.width = 1024;
        keyLight.shadow.mapSize.height = 1024;
        
        // 添加触摸事件支持
        let touchX = 0;
        let touchY = 0;
        
        document.addEventListener('touchstart', (event) => {
            if (event.touches.length === 1) {
                touchX = event.touches[0].clientX;
                touchY = event.touches[0].clientY;
            }
        }, { passive: true });
        
        document.addEventListener('touchmove', (event) => {
            if (event.touches.length === 1) {
                const touch = event.touches[0];
                mouseX = (touch.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(touch.clientY / window.innerHeight) * 2 + 1;
                targetRotationY = mouseX * 0.25;
                targetRotationX = mouseY * 0.12;
            }
        }, { passive: true });
    }
})();
